services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      # Leave OPENAI_API_KEY unset to run in local mode.
      IPDR_MODE: ${IPDR_MODE:-auto}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    depends_on:
      - qdrant

volumes:
  qdrant_storage:
